<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Milez Ahead — Live trip</title>
<style>
  :root{--navy:#282848;--teal:#007880;--gold:#C0B070;--bg:#FBFAF7}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--navy);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:520px;margin:0 auto;padding:18px 16px 40px}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 0 14px}
  .logo{width:38px;height:38px;border-radius:11px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
  .logo .a{color:var(--gold)}.logo .b{color:var(--teal)}
  .brand .t{font-weight:800;letter-spacing:.2px}.brand .s{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--teal);font-weight:700}
  .card{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:18px;padding:18px;box-shadow:0 2px 14px rgba(0,0,0,.04);margin-bottom:14px}
  .greet{font-size:13px;color:var(--teal);font-weight:700;margin-bottom:5px}
  .headline{font-size:21px;font-weight:800;line-height:1.25}
  .ref{font-size:12px;color:#8a8aa0;margin-top:4px;font-variant-numeric:tabular-nums}
  .pulse{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--teal);margin-right:7px;box-shadow:0 0 0 0 rgba(0,120,128,.5);animation:p 1.8s infinite}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(0,120,128,.45)}70%{box-shadow:0 0 0 12px rgba(0,120,128,0)}100%{box-shadow:0 0 0 0 rgba(0,120,128,0)}}
  .steps{list-style:none;margin:6px 0 0;padding:0}
  .step{display:flex;gap:12px;align-items:flex-start;position:relative;padding:0 0 18px}
  .step:last-child{padding-bottom:0}
  .step .line{position:absolute;left:13px;top:26px;bottom:-2px;width:2px;background:#e7e7ef}
  .step.done .line{background:var(--teal)}
  .dot{width:28px;height:28px;border-radius:50%;flex:0 0 28px;display:flex;align-items:center;justify-content:center;background:#e7e7ef;color:#fff;font-size:15px;z-index:1}
  .step.done .dot{background:var(--teal)}
  .step.current .dot{background:var(--navy);box-shadow:0 0 0 5px rgba(40,40,72,.12)}
  .step .lab{font-weight:700;padding-top:3px}
  .step.todo .lab{color:#a3a3b5;font-weight:600}
  .step .at{font-size:12px;color:#9a9ab0;margin-left:auto;padding-top:5px;font-variant-numeric:tabular-nums}
  .hsteps{display:flex;align-items:flex-start;padding:4px 0 2px}
  .hstep{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}
  .hstep::before{content:'';position:absolute;top:11px;right:50%;width:100%;height:3px;background:#e7e7ef}
  .hstep:first-child::before{display:none}
  .hstep.done::before,.hstep.current::before{background:var(--teal)}
  .hdot{width:24px;height:24px;border-radius:50%;background:#e7e7ef;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;z-index:1}
  .hstep.done .hdot{background:var(--teal)}
  .hstep.current .hdot{background:var(--navy);box-shadow:0 0 0 4px rgba(40,40,72,.12)}
  .hlab{font-size:10px;margin-top:7px;text-align:center;font-weight:700;line-height:1.15;color:var(--navy)}
  .hstep.todo .hlab{color:#a3a3b5;font-weight:600}
  .htime{font-size:9px;color:#9a9ab0;margin-top:2px;font-variant-numeric:tabular-nums}
  .row{display:flex;gap:10px;align-items:center;padding:8px 0}
  .row .ic{width:30px;color:var(--teal);font-size:18px;text-align:center}
  .lbl{font-size:11px;color:#9a9ab0;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
  .val{font-weight:600}
  .av{width:54px;height:54px;border-radius:50%;object-fit:cover;background:#e7e7ef;flex:0 0 54px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#8a8aa0;font-size:19px;margin-right:12px}
  .stars{color:var(--gold);letter-spacing:1px;font-size:14px}
  .muted{color:#8a8aa0;font-size:12px}
  .vthumb{width:100%;max-height:160px;object-fit:cover;border-radius:12px;margin-top:10px;border:1px solid rgba(0,0,0,.06)}
  .platewrap{text-align:center;margin-top:10px}
  .plate{display:inline-block;background:#fff;border:2.5px solid #111;border-radius:7px;padding:6px 16px;font-weight:800;letter-spacing:2px;font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;font-size:18px;color:#111}
  #mapcard{padding:0;overflow:hidden;display:none}
  .map{width:100%;height:250px;background:#e7e7ef}
  .dvcols{display:flex;gap:14px;align-items:flex-start}
  .dvleft{flex:0 0 44%;min-width:0;text-align:center}
  .dvright{flex:1;min-width:0}
  .vthumb2{width:100%;max-height:120px;object-fit:contain;background:#fff}
  .dvleft .plate{font-size:15px;padding:5px 12px;margin-top:8px;letter-spacing:1.5px}
  .vname{font-size:12px;color:#6a6a82;margin-top:7px;font-weight:600}
  .dvhead{display:flex;gap:10px;align-items:center;padding-bottom:9px;margin-bottom:3px;border-bottom:1px solid rgba(0,0,0,.05)}
  .dvhead .av{width:42px;height:42px;flex:0 0 42px;font-size:16px;margin:0}
  .stat{font-size:13px;color:#3a3a52;margin-top:7px;line-height:1.3}
  .route2{position:relative}
  .rrow{display:flex;gap:12px;align-items:flex-start;position:relative;padding:6px 0}
  .rdot{width:14px;height:14px;border-radius:50%;flex:0 0 14px;margin-top:3px;z-index:1}
  .rdot.green{background:#22c55e}.rdot.red{background:#ef4444}
  .rrow:first-child::after{content:'';position:absolute;left:6px;top:22px;bottom:-4px;border-left:2px dotted #c3c3d0}
  a.btn{display:block;text-align:center;text-decoration:none;background:var(--navy);color:#fff;font-weight:700;padding:13px;border-radius:13px;margin-top:8px}
  a.btn.ghost{background:#fff;color:var(--navy);border:1.5px solid rgba(0,0,0,.12)}
  .foot{text-align:center;color:#a3a3b5;font-size:11px;margin-top:14px}
  .cancel{background:#fff3f1;border-color:#f3c7c0}.cancel .headline{color:#c0392b}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><div class="logo"><span class="a">M</span><span class="b">A</span></div>
    <div><div class="t">Milez Ahead</div><div class="s">Live trip</div></div></div>
  <div id="mapcard" class="card"><div id="map" class="map"></div></div>
  <div id="app"><div class="card"><div class="headline">Loading your trip…</div></div></div>
  <div class="foot">Powered by Milez Ahead · Executive &amp; medical transport</div>
</div>
<script>
const EDGE='https://izslchhcavckowatgbel.supabase.co/functions/v1/track';
const TOKEN=new URLSearchParams(location.search).get('token')||'';
// Set MAPS_KEY to a Google Maps JS API browser key (restricted to this domain)
// to embed the live map. While empty, the page falls back to the "open in Maps" link.
const MAPS_KEY='AIzaSyAtZvXbiV8BhpC_6dENVYrxoNWdPJlwNiM';
const fmt=t=>t?new Date(t).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}):'';
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let _map,_dirR,_drvMarker,_routeDrawn,_mapsReady,_last;
function loadMaps(){ if(!MAPS_KEY) return; const s=document.createElement('script'); s.async=true; s.src='https://maps.googleapis.com/maps/api/js?key='+MAPS_KEY; s.onload=()=>{_mapsReady=true; if(_last)drawMap(_last);}; document.head.appendChild(s); }
function drawMap(d){
  if(!MAPS_KEY||!_mapsReady||!d) return;
  const card=document.getElementById('mapcard'); if(!card) return;
  card.style.display='block'; // show BEFORE creating the map so it can size (else grey)
  if(!_map){
    _map=new google.maps.Map(document.getElementById('map'),{center:{lat:-29,lng:24.5},zoom:5,disableDefaultUI:true,zoomControl:true,gestureHandling:'greedy'});
    _dirR=new google.maps.DirectionsRenderer({map:_map,suppressMarkers:false,polylineOptions:{strokeColor:'#007880',strokeWeight:5}});
  }
  if(!_routeDrawn && d.route.pickup && d.route.dropoff){ _routeDrawn=true; new google.maps.DirectionsService().route({origin:d.route.pickup,destination:d.route.dropoff,travelMode:'DRIVING'},(res,st)=>{ if(st==='OK') _dirR.setDirections(res); }); }
  if(d.driver&&d.driver.lat!=null&&d.driver.lng!=null){ const pos={lat:d.driver.lat,lng:d.driver.lng}; if(!_drvMarker){_drvMarker=new google.maps.Marker({map:_map,position:pos,title:'Your driver',icon:{path:google.maps.SymbolPath.CIRCLE,scale:8,fillColor:'#8bc53f',fillOpacity:1,strokeColor:'#fff',strokeWeight:3}});}else _drvMarker.setPosition(pos); }
}
function render(d){
  if(!d){document.getElementById('app').innerHTML='<div class="card"><div class="headline">Trip not found</div><div class="ref">This tracking link is no longer active.</div></div>';return;}
  const SHORT={booked:'Booked',assigned:'Assigned',enroute:'En route',arrived:'Arrived',started:'In trip',complete:'Done'};
  const steps=d.steps.map(s=>{
    const cls=s.done?'done':(s.current?'current':'todo');
    const mark=s.done?'✓':'';
    return '<div class="hstep '+cls+'"><div class="hdot">'+mark+'</div><div class="hlab">'+esc(SHORT[s.key]||s.label)+'</div>'+(s.at&&s.done?'<div class="htime">'+fmt(s.at)+'</div>':'')+'</div>';
  }).join('');
  let driver='';
  if(d.driver){
    const dv=d.driver;
    const initials=esc((dv.name||'D').trim().slice(0,1).toUpperCase());
    const av=dv.photo?'<img class="av" src="'+dv.photo+'" alt="" onerror="this.outerHTML=\'<div class=&quot;av&quot;>'+initials+'</div>\'">':'<div class="av">'+initials+'</div>';
    const vname=dv.vehicle?esc(dv.vehicle.replace(/\s*\(.*\)\s*$/,'')):'';
    const left='<div class="dvleft">'+
      (dv.vehiclePhoto?'<img class="vthumb2" src="'+dv.vehiclePhoto+'" alt="Vehicle" onerror="this.style.display=\'none\'">':'')+
      (dv.reg?'<div class="plate">'+esc(dv.reg)+'</div>':'')+
      (vname?'<div class="vname">'+vname+'</div>':'')+
    '</div>';
    let rating;
    if(dv.rating){const full=Math.round(dv.rating);rating='<span class="stars">'+'★'.repeat(full)+'☆'.repeat(5-full)+'</span> <span class="muted">'+dv.rating.toFixed(1)+' ('+dv.ratingCount+')</span>';}
    else rating='<span style="color:var(--teal);font-weight:700">✓ Verified Milez driver</span>';
    const stats='<div class="stat">'+rating+'</div>'+
      (dv.trips?'<div class="stat">🚗 '+dv.trips+' trips completed</div>':'')+
      (dv.since?'<div class="stat">📅 With us since '+dv.since+'</div>':'');
    const right='<div class="dvright"><div class="dvhead">'+av+'<div class="val" style="font-size:16px">'+esc(dv.name||'Assigned')+'</div></div>'+stats+'</div>';
    driver='<div class="card"><div class="lbl">Your driver &amp; vehicle</div><div class="dvcols">'+left+right+'</div></div>';
  }
  let route='';
  if(d.route.pickup||d.route.dropoff){
    const live=d.driver&&d.driver.live;
    route='<div class="card"><div class="route2">'+
      '<div class="rrow"><span class="rdot green"></span><div><div class="lbl">Pickup</div><div class="val">'+esc(d.route.pickup||'—')+'</div></div></div>'+
      '<div class="rrow"><span class="rdot red"></span><div><div class="lbl">Drop-off</div><div class="val">'+esc(d.route.dropoff||'—')+'</div></div></div>'+
    '</div>'+
      (!MAPS_KEY && d.route.mapsLink?'<a class="btn ghost" href="'+d.route.mapsLink+'" target="_blank" rel="noopener">🗺️ See the route'+(live?' & your driver':'')+'</a>':'')+
    '</div>';
  }
  const when=(d.tripDate||'')+(d.pickupTime?' · '+d.pickupTime:'');
  document.getElementById('app').innerHTML=
    '<div class="card'+(d.cancelled?' cancel':'')+'">'+(d.clientName&&!d.cancelled?'<div class="greet">Hi '+esc(d.clientName)+' 👋</div>':'')+(d.cancelled?'':'<span class="pulse"></span>')+'<span class="headline">'+esc(d.headline)+'</span><div class="ref">'+esc(d.ref)+(when?' · '+esc(when):'')+'</div></div>'+
    '<div class="card"><div class="hsteps">'+steps+'</div></div>'+driver+route;
  _last=d; drawMap(d);
}
async function tick(){
  if(!TOKEN){render(null);return;}
  try{const r=await fetch(EDGE+'?token='+encodeURIComponent(TOKEN)+'&format=json',{cache:'no-store'});render(r.ok?await r.json():null);}catch(e){}
}
loadMaps();tick();setInterval(tick,12000);
</script>
</body>
</html>
