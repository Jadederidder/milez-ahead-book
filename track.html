<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Milez Ahead — Live trip</title>
<style>
  :root{--navy:#282848;--teal:#007880;--gold:#C0B070;--bg:#FBFAF7}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--navy);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:520px;margin:0 auto;padding:18px 16px 40px}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 0 14px}
  .logo{width:38px;height:38px;border-radius:11px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
  .logo .a{color:var(--gold)}.logo .b{color:var(--teal)}
  .brand .t{font-weight:800;letter-spacing:.2px}.brand .s{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--teal);font-weight:700}
  .card{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:18px;padding:18px;box-shadow:0 2px 14px rgba(0,0,0,.04);margin-bottom:14px}
  .greet{font-size:13px;color:var(--teal);font-weight:700;margin-bottom:5px}
  .headline{font-size:21px;font-weight:800;line-height:1.25}
  .ref{font-size:12px;color:#8a8aa0;margin-top:4px;font-variant-numeric:tabular-nums}
  .pulse{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--teal);margin-right:7px;box-shadow:0 0 0 0 rgba(0,120,128,.5);animation:p 1.8s infinite}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(0,120,128,.45)}70%{box-shadow:0 0 0 12px rgba(0,120,128,0)}100%{box-shadow:0 0 0 0 rgba(0,120,128,0)}}
  .steps{list-style:none;margin:6px 0 0;padding:0}
  .step{display:flex;gap:12px;align-items:flex-start;position:relative;padding:0 0 18px}
  .step:last-child{padding-bottom:0}
  .step .line{position:absolute;left:13px;top:26px;bottom:-2px;width:2px;background:#e7e7ef}
  .step.done .line{background:var(--teal)}
  .dot{width:28px;height:28px;border-radius:50%;flex:0 0 28px;display:flex;align-items:center;justify-content:center;background:#e7e7ef;color:#fff;font-size:15px;z-index:1}
  .step.done .dot{background:var(--teal)}
  .step.current .dot{background:var(--navy);box-shadow:0 0 0 5px rgba(40,40,72,.12)}
  .step .lab{font-weight:700;padding-top:3px}
  .step.todo .lab{color:#a3a3b5;font-weight:600}
  .step .at{font-size:12px;color:#9a9ab0;margin-left:auto;padding-top:5px;font-variant-numeric:tabular-nums}
  .hsteps{display:flex;align-items:flex-start;padding:4px 0 2px}
  .hstep{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}
  .hstep::before{content:'';position:absolute;top:11px;right:50%;width:100%;height:3px;background:#e7e7ef}
  .hstep:first-child::before{display:none}
  .hstep.done::before,.hstep.current::before{background:var(--teal)}
  .hdot{width:24px;height:24px;border-radius:50%;background:#e7e7ef;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;z-index:1}
  .hstep.done .hdot{background:var(--teal)}
  .hstep.current .hdot{background:var(--navy);box-shadow:0 0 0 4px rgba(40,40,72,.12)}
  .hlab{font-size:10px;margin-top:7px;text-align:center;font-weight:700;line-height:1.15;color:var(--navy)}
  .hstep.todo .hlab{color:#a3a3b5;font-weight:600}
  .htime{font-size:9px;color:#9a9ab0;margin-top:2px;font-variant-numeric:tabular-nums}
  .row{display:flex;gap:10px;align-items:center;padding:8px 0}
  .row .ic{width:30px;color:var(--teal);font-size:18px;text-align:center}
  .lbl{font-size:11px;color:#9a9ab0;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
  .val{font-weight:600}
  .av{width:54px;height:54px;border-radius:50%;object-fit:cover;background:#e7e7ef;flex:0 0 54px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#8a8aa0;font-size:19px;margin-right:12px}
  .stars{color:var(--gold);letter-spacing:1px;font-size:14px}
  .muted{color:#8a8aa0;font-size:12px}
  .vthumb{width:100%;max-height:160px;object-fit:cover;border-radius:12px;margin-top:10px;border:1px solid rgba(0,0,0,.06)}
  .platewrap{text-align:center;margin-top:10px}
  .plate{display:inline-block;background:#fff;border:2.5px solid #111;border-radius:7px;padding:6px 16px;font-weight:800;letter-spacing:2px;font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;font-size:18px;color:#111}
  #mapcard{padding:0;overflow:hidden;display:none}
  .map{width:100%;height:250px;background:#e7e7ef}
  .dvcols{display:flex;gap:14px;align-items:flex-start}
  .dvleft{flex:0 0 44%;min-width:0;text-align:center}
  .dvright{flex:1;min-width:0}
  .vthumb2{width:100%;max-height:120px;object-fit:contain;background:#fff}
  .dvleft .plate{font-size:15px;padding:5px 12px;margin-top:8px;letter-spacing:1.5px}
  .vname{font-size:12px;color:#6a6a82;margin-top:7px;font-weight:600}
  .dvhead{display:flex;gap:10px;align-items:center;padding-bottom:9px;margin-bottom:3px;border-bottom:1px solid rgba(0,0,0,.05)}
  .dvhead .av{width:42px;height:42px;flex:0 0 42px;font-size:16px;margin:0}
  .stat{font-size:13px;color:#3a3a52;margin-top:7px;line-height:1.3}
  .route2{position:relative}
  .rrow{display:flex;gap:12px;align-items:flex-start;position:relative;padding:6px 0}
  .rdot{width:14px;height:14px;border-radius:50%;flex:0 0 14px;margin-top:3px;z-index:1}
  .rdot.green{background:#22c55e}.rdot.red{background:#ef4444}
  .rrow:first-child::after{content:'';position:absolute;left:6px;top:22px;bottom:-4px;border-left:2px dotted #c3c3d0}
  a.btn{display:block;text-align:center;text-decoration:none;background:var(--navy);color:#fff;font-weight:700;padding:13px;border-radius:13px;margin-top:8px}
  a.btn.ghost{background:#fff;color:var(--navy);border:1.5px solid rgba(0,0,0,.12)}
  .foot{text-align:center;color:#a3a3b5;font-size:11px;margin-top:14px}
  .cancel{background:#fff3f1;border-color:#f3c7c0}.cancel .headline{color:#c0392b}
  .etachip{display:inline-block;background:var(--teal);color:#fff;font-weight:800;font-size:12px;padding:4px 12px;border-radius:999px;margin-top:11px;letter-spacing:.02em}
  .badges{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px;padding-top:12px;border-top:1px solid rgba(0,0,0,.05)}
  .badge{display:inline-flex;align-items:center;gap:5px;background:#eef6f0;color:#0a7d4b;font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px}
  .dvbtns{display:flex;gap:9px;margin-top:12px}
  .dvbtns a{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;font-weight:700;font-size:13px;padding:11px;border-radius:12px}
  .dvbtns a.call{background:var(--teal);color:#fff}
  .dvbtns a.share{background:#fff;color:var(--navy);border:1.5px solid rgba(0,0,0,.12)}
  .sosbtn{display:block;width:100%;background:#fff;color:#c0392b;border:1.5px solid #f0cdc6;font-weight:700;font-size:13px;padding:12px;border-radius:13px;margin-top:6px;cursor:pointer}
  .sosbtn:active{background:#fff3f1}
  .modal{position:fixed;inset:0;background:rgba(20,20,35,.55);display:none;align-items:center;justify-content:center;padding:24px;z-index:50}
  .modal.show{display:flex}
  .sheet{background:#fff;border-radius:18px;padding:22px;max-width:380px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.25)}
  .sheet h3{margin:0 0 8px;font-size:18px}
  .sheet p{margin:0 0 18px;color:#5a5a70;font-size:14px;line-height:1.45}
  .sheet .acts{display:flex;gap:10px}
  .sheet .acts button{flex:1;font-weight:700;font-size:14px;padding:12px;border-radius:12px;border:none;cursor:pointer}
  .sheet .acts .go{background:#c0392b;color:#fff}
  .sheet .acts .no{background:#eee;color:var(--navy)}
  .mp{display:flex;gap:10px;align-items:flex-start;margin-top:13px;padding-top:13px;border-top:1px solid rgba(0,0,0,.05)}
  .mp .ic{font-size:16px;line-height:1.4}
  .arrival{display:inline-block;background:#eef6f0;color:#0a7d4b;font-weight:700;font-size:12.5px;padding:7px 12px;border-radius:11px;margin-top:13px;line-height:1.35}
  .arrival.late{background:#fdf2e9;color:#b9770e}
  .ratestars{font-size:36px;letter-spacing:7px;color:var(--gold);cursor:pointer;user-select:none;text-align:center;margin-top:8px}
  .ratestars span{opacity:.3;transition:opacity .12s}
  .ratestars span.on{opacity:1}
  .tiprow{display:flex;gap:8px;justify-content:center;margin-top:15px;flex-wrap:wrap}
  .tip{border:1.5px solid rgba(0,0,0,.12);background:#fff;border-radius:999px;padding:8px 16px;font-weight:700;font-size:14px;cursor:pointer;color:var(--navy)}
  .tip.on{background:var(--teal);color:#fff;border-color:var(--teal)}
  .rcmt{width:100%;border:1px solid rgba(0,0,0,.12);border-radius:12px;padding:11px;font-size:14px;margin-top:13px;font-family:inherit;resize:vertical}
  .receipt .rl{display:flex;justify-content:space-between;gap:14px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.05);font-size:14px}
  .receipt .rl:last-of-type{border-bottom:none}
  .receipt .rl .k{color:#8a8aa0;flex:0 0 auto}
  .receipt .rl .v{font-weight:700;text-align:right}
  @media print{body{background:#fff}.brand .s,.foot,.sosbtn,.dvbtns,#rateCard,#mapcard{display:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><div class="logo"><span class="a">M</span><span class="b">A</span></div>
    <div><div class="t">Milez Ahead</div><div class="s">Live trip</div></div></div>
  <div id="mapcard" class="card"><div id="map" class="map"></div></div>
  <div id="app"><div class="card"><div class="headline">Loading your trip…</div></div></div>
  <div class="foot">Powered by Milez Ahead · Executive &amp; medical transport</div>
</div>
<div id="sosModal" class="modal"><div class="sheet">
  <div id="sosBody"><h3>Alert the control room?</h3><p>We’ll immediately notify our team with your trip details and your driver’s live location. Only use this if you feel unsafe.</p></div>
  <div id="sosActs" class="acts"><button class="no" onclick="closeSos()">Cancel</button><button id="sosGo" class="go" onclick="sosConfirm()">Yes, alert them</button></div>
</div></div>
<script>
const EDGE='https://izslchhcavckowatgbel.supabase.co/functions/v1/track';
const SOS_EDGE='https://izslchhcavckowatgbel.supabase.co/functions/v1/track-sos';
const FEEDBACK_EDGE='https://izslchhcavckowatgbel.supabase.co/functions/v1/submit-feedback';
const TOKEN=new URLSearchParams(location.search).get('token')||'';
// Set MAPS_KEY to a Google Maps JS API browser key (restricted to this domain)
// to embed the live map. While empty, the page falls back to the "open in Maps" link.
const MAPS_KEY='AIzaSyAtZvXbiV8BhpC_6dENVYrxoNWdPJlwNiM';
const fmt=t=>t?new Date(t).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}):'';
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let _map,_dirR,_drvMarker,_routeDrawn,_mapsReady,_last,_eta=null,_timer,_myRating=0,_myTip=null;
function loadMaps(){ if(!MAPS_KEY) return; const s=document.createElement('script'); s.async=true; s.src='https://maps.googleapis.com/maps/api/js?key='+MAPS_KEY; s.onload=()=>{_mapsReady=true; if(_last)drawMap(_last);}; document.head.appendChild(s); }
function drawMap(d){
  if(!MAPS_KEY||!_mapsReady||!d) return;
  const card=document.getElementById('mapcard'); if(!card) return;
  card.style.display='block'; // show BEFORE creating the map so it can size (else grey)
  if(!_map){
    _map=new google.maps.Map(document.getElementById('map'),{center:{lat:-29,lng:24.5},zoom:5,disableDefaultUI:true,zoomControl:true,gestureHandling:'greedy'});
    _dirR=new google.maps.DirectionsRenderer({map:_map,suppressMarkers:false,polylineOptions:{strokeColor:'#007880',strokeWeight:5}});
  }
  if(!_routeDrawn && d.route.pickup && d.route.dropoff){ _routeDrawn=true; new google.maps.DirectionsService().route({origin:d.route.pickup,destination:d.route.dropoff,travelMode:'DRIVING'},(res,st)=>{ if(st==='OK') _dirR.setDirections(res); }); }
  if(d.driver&&d.driver.lat!=null&&d.driver.lng!=null){ const pos={lat:d.driver.lat,lng:d.driver.lng}; if(!_drvMarker){_drvMarker=new google.maps.Marker({map:_map,position:pos,title:'Your driver',icon:{path:google.maps.SymbolPath.CIRCLE,scale:8,fillColor:'#8bc53f',fillOpacity:1,strokeColor:'#fff',strokeWeight:3}});}else _drvMarker.setPosition(pos); }
  computeEta();
  computeArrival();
}
// Live ETA: driver's current position → pickup, shown while they're on the way.
function computeEta(){
  if(!_mapsReady||!_last) return;
  const d=_last, st=k=>(d.steps.find(s=>s.key===k)||{}).done;
  if(!(d.driver&&d.driver.live&&!st('arrived')&&!st('started')&&!d.cancelled)||d.driver.lat==null||!d.route.pickup){_eta=null;return;}
  new google.maps.DirectionsService().route({origin:{lat:d.driver.lat,lng:d.driver.lng},destination:d.route.pickup,travelMode:'DRIVING'},(res,s)=>{
    if(s==='OK'&&res.routes[0]){_eta=res.routes[0].legs[0].duration.text; const el=document.getElementById('eta'); if(el){el.style.display='inline-block';el.textContent='🛣️ ~'+_eta+' away';}}
  });
}
// Arrival intelligence: estimated drop-off time, compared to the appointment time.
function computeArrival(){
  if(!_mapsReady||!_last) return;
  const d=_last, st=k=>(d.steps.find(s=>s.key===k)||{}).done;
  if(!d.route.pickup||!d.route.dropoff||d.cancelled||st('complete')) return;
  const live=d.driver&&d.driver.live&&d.driver.lat!=null&&!st('arrived');
  const started=st('started');
  const req={destination:d.route.dropoff,travelMode:'DRIVING'};
  if(started&&live){req.origin={lat:d.driver.lat,lng:d.driver.lng};}        // mid-trip: straight to drop-off
  else if(live){req.origin={lat:d.driver.lat,lng:d.driver.lng};req.waypoints=[{location:d.route.pickup}];} // en route via pickup
  else {req.origin=d.route.pickup;}                                          // scheduled: from pickup
  new google.maps.DirectionsService().route(req,(res,s)=>{
    if(s!=='OK'||!res.routes[0]) return;
    const secs=res.routes[0].legs.reduce((a,l)=>a+l.duration.value,0);
    let base=new Date();
    if(!live&&!started&&d.pickupTime){const p=d.pickupTime.split(':');const t=new Date();t.setHours(+p[0],+p[1],0,0);if(t>base)base=t;}
    const arrive=new Date(base.getTime()+secs*1000);
    const hh=String(arrive.getHours()).padStart(2,'0'),mm=String(arrive.getMinutes()).padStart(2,'0');
    let txt='🏁 '+((live||started)?'Arriving':'Est. arrival')+' ~'+hh+':'+mm, cls='arrival';
    if(d.appointmentTime){const a=d.appointmentTime.split(':');const appt=new Date(arrive);appt.setHours(+a[0],+a[1],0,0);const diff=Math.round((appt-arrive)/60000);
      if(diff>=0) txt+=' · '+diff+' min before your '+d.appointmentTime+' appointment';
      else {txt+=' · '+(-diff)+' min after your '+d.appointmentTime+' appointment';cls='arrival late';}
    }
    const el=document.getElementById('arrivalEta'); if(el){el.className=cls;el.textContent=txt;el.style.display='inline-block';}
  });
}
function render(d){
  if(!d){document.getElementById('app').innerHTML='<div class="card"><div class="headline">Trip not found</div><div class="ref">This tracking link is no longer active.</div></div>';return;}
  const SHORT={booked:'Booked',assigned:'Assigned',enroute:'En route',arrived:'Arrived',started:'In trip',complete:'Done'};
  const steps=d.steps.map(s=>{
    const cls=s.done?'done':(s.current?'current':'todo');
    const mark=s.done?'✓':'';
    return '<div class="hstep '+cls+'"><div class="hdot">'+mark+'</div><div class="hlab">'+esc(SHORT[s.key]||s.label)+'</div>'+(s.at&&s.done?'<div class="htime">'+fmt(s.at)+'</div>':'')+'</div>';
  }).join('');
  let driver='';
  if(d.driver){
    const dv=d.driver;
    const initials=esc((dv.name||'D').trim().slice(0,1).toUpperCase());
    const av=dv.photo?'<img class="av" src="'+dv.photo+'" alt="" onerror="this.outerHTML=\'<div class=&quot;av&quot;>'+initials+'</div>\'">':'<div class="av">'+initials+'</div>';
    const vname=dv.vehicleDesc?esc(dv.vehicleDesc):(dv.vehicle?esc(dv.vehicle.replace(/\s*\(.*\)\s*$/,'')):'');
    const left='<div class="dvleft">'+
      (dv.vehiclePhoto?'<img class="vthumb2" src="'+dv.vehiclePhoto+'" alt="Vehicle" onerror="this.style.display=\'none\'">':'')+
      (dv.reg?'<div class="plate">'+esc(dv.reg)+'</div>':'')+
      (vname?'<div class="vname">'+vname+'</div>':'')+
    '</div>';
    let rating;
    if(dv.rating){const full=Math.round(dv.rating);rating='<span class="stars">'+'★'.repeat(full)+'☆'.repeat(5-full)+'</span> <span class="muted">'+dv.rating.toFixed(1)+' ('+dv.ratingCount+')</span>';}
    else rating='<span style="color:var(--teal);font-weight:700">✓ Verified Milez driver</span>';
    const stats='<div class="stat">'+rating+'</div>'+
      (dv.trips?'<div class="stat">🚗 '+dv.trips+' trips completed</div>':'')+
      (dv.languages&&dv.languages.length?'<div class="stat">🗣️ '+esc(dv.languages.join(', '))+'</div>':'')+
      (dv.since?'<div class="stat">📅 With us since '+dv.since+'</div>':'');
    const right='<div class="dvright"><div class="dvhead">'+av+'<div class="val" style="font-size:16px">'+esc(dv.name||'Assigned')+'</div></div>'+stats+'</div>';
    const vf=dv.verified||{};
    const accBadges=(dv.accreditations||[]).map(a=>'<span class="badge">✓ '+esc(a)+'</span>').join('');
    const allBadges=(vf.licence?'<span class="badge">✓ Licence verified</span>':'')+(vf.prdp?'<span class="badge">✓ PrDP verified</span>':'')+accBadges;
    const badges=allBadges?'<div class="badges">'+allBadges+'</div>':'';
    const acts='<div class="dvbtns">'+(dv.phone?'<a class="call" href="tel:'+esc(dv.phone)+'">📞 Call driver</a>':'')+'<a class="share" href="#" onclick="shareTrip(event)">🔗 Share trip</a></div>';
    driver='<div class="card"><div class="lbl">Your driver &amp; vehicle</div><div class="dvcols">'+left+right+'</div>'+badges+acts+'</div>';
  }
  let route='';
  if(d.route.pickup||d.route.dropoff){
    const live=d.driver&&d.driver.live;
    const stp=k=>(d.steps.find(s=>s.key===k)||{}).done;
    const showArrival=!d.cancelled&&!stp('complete');
    const showMeet=d.route.meetingPoint&&!d.cancelled&&!stp('started');
    route='<div class="card"><div class="route2">'+
      '<div class="rrow"><span class="rdot green"></span><div><div class="lbl">Pickup</div><div class="val">'+esc(d.route.pickup||'—')+'</div></div></div>'+
      '<div class="rrow"><span class="rdot red"></span><div><div class="lbl">Drop-off</div><div class="val">'+esc(d.route.dropoff||'—')+'</div></div></div>'+
    '</div>'+
      (showMeet?'<div class="mp"><span class="ic">📍</span><div><div class="lbl">Where to meet your driver</div><div class="val">'+esc(d.route.meetingPoint)+'</div></div></div>':'')+
      (showArrival?'<div><span id="arrivalEta" class="arrival" style="display:none"></span></div>':'')+
      (!MAPS_KEY && d.route.mapsLink?'<a class="btn ghost" href="'+d.route.mapsLink+'" target="_blank" rel="noopener">🗺️ See the route'+(live?' & your driver':'')+'</a>':'')+
    '</div>';
  }
  const when=(d.tripDate||'')+(d.pickupTime?' · '+d.pickupTime:'');
  const st=k=>(d.steps.find(s=>s.key===k)||{}).done;
  const showEta=d.driver&&d.driver.live&&!st('arrived')&&!st('started')&&!d.cancelled;
  const etaChip=showEta?'<div id="eta" class="etachip"'+(_eta?'':' style="display:none"')+'>'+(_eta?'🛣️ ~'+esc(_eta)+' away':'')+'</div>':'';
  const sosBtn=(d.driver&&!d.cancelled&&!st('complete'))?'<button class="sosbtn" onclick="openSos()">🆘 I feel unsafe — alert control room</button>':'';
  // After the trip: branded receipt + rate & tip + one-tap return booking.
  let after='';
  if(d.receipt){
    const r=d.receipt, rl=(k,v)=>'<div class="rl"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>';
    const receipt='<div class="card receipt"><div class="lbl">Trip receipt</div>'+
      rl('Reference',esc(d.ref))+(d.tripDate?rl('Date',esc(d.tripDate)):'')+
      rl('From',esc(d.route.pickup||'—'))+rl('To',esc(d.route.dropoff||'—'))+
      (d.driver&&d.driver.name?rl('Driver',esc(d.driver.name)):'')+
      (r.distanceKm!=null?rl('Distance',r.distanceKm+' km'):'')+
      (r.durationMin!=null?rl('Duration',r.durationMin+' min'):'')+
      (r.fare!=null?rl('Fare','R'+r.fare.toFixed(2)):'')+
      '<a class="btn ghost" href="#" onclick="window.print();return false" style="margin-top:14px">🧾 Save / print receipt</a></div>';
    const rate='<div class="card rate" id="rateCard"><div class="lbl">How was your trip?</div>'+
      '<div class="ratestars" id="stars">'+[1,2,3,4,5].map(n=>'<span data-n="'+n+'" onclick="setRating('+n+')">★</span>').join('')+'</div>'+
      '<div class="tiprow" id="tiprow">'+[20,50,100].map(t=>'<button class="tip" data-t="'+t+'" onclick="setTip('+t+')">R'+t+'</button>').join('')+'<button class="tip" data-t="0" onclick="setTip(0)">No tip</button></div>'+
      '<textarea class="rcmt" id="rcmt" placeholder="Tell us about your driver (optional)"></textarea>'+
      '<a class="btn" href="#" onclick="submitRating(event)" style="margin-top:12px">Submit rating</a></div>';
    const rb=d.rebook||{}, p=new URLSearchParams();
    if(rb.name)p.set('name',rb.name); if(rb.phone)p.set('phone',rb.phone);
    if(rb.from)p.set('pickup',rb.from); if(rb.to)p.set('dropoff',rb.to);
    const rebook='<a class="btn" href="./?'+p.toString()+'" style="background:var(--teal)">🔁 Book my return trip</a>';
    after=receipt+rate+rebook;
  }
  document.getElementById('app').innerHTML=
    '<div class="card'+(d.cancelled?' cancel':'')+'">'+(d.clientName&&!d.cancelled?'<div class="greet">Hi '+esc(d.clientName)+' 👋</div>':'')+(d.cancelled?'':'<span class="pulse"></span>')+'<span class="headline">'+esc(d.headline)+'</span><div class="ref">'+esc(d.ref)+(when?' · '+esc(when):'')+'</div>'+etaChip+'</div>'+
    '<div class="card"><div class="hsteps">'+steps+'</div></div>'+driver+route+sosBtn+after;
  _last=d; drawMap(d);
}
async function tick(){
  if(!TOKEN){render(null);return;}
  try{
    const r=await fetch(EDGE+'?token='+encodeURIComponent(TOKEN),{cache:'no-store'});
    const d=r.ok?await r.json():null;
    render(d);
    // Once the trip is complete nothing changes — stop polling so the rating
    // widget keeps the client's star/tip selection instead of resetting.
    if(d&&(d.steps||[]).some(s=>s.key==='complete'&&s.done)&&_timer){clearInterval(_timer);_timer=null;}
  }catch(e){}
}
function setRating(n){_myRating=n;document.querySelectorAll('#stars span').forEach(s=>s.classList.toggle('on',Number(s.dataset.n)<=n));}
function setTip(t){_myTip=t;document.querySelectorAll('#tiprow .tip').forEach(b=>b.classList.toggle('on',Number(b.dataset.t)===t));}
async function submitRating(e){
  if(e)e.preventDefault();
  if(!_myRating){alert('Please tap a star to rate your trip');return;}
  const cmt=(document.getElementById('rcmt')||{}).value||'';
  const payload={token:TOKEN,rating:_myRating,comment:cmt}; if(_myTip)payload.tip=_myTip;
  try{
    const r=await fetch(FEEDBACK_EDGE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const j=await r.json().catch(()=>({})); const card=document.getElementById('rateCard');
    if(r.ok&&j.ok&&card){card.innerHTML='<div class="lbl">Thank you</div><div class="headline" style="font-size:18px;margin-top:6px">🙏 Thanks for the '+_myRating+'★'+(_myTip?' and the R'+_myTip+' tip':'')+'</div><p class="muted" style="margin-top:6px">Your feedback keeps Milez Ahead world-class.</p>';}
    else alert('Could not submit just yet, please try again.');
  }catch(_){alert('Could not submit just yet, please try again.');}
}
function shareTrip(e){
  if(e)e.preventDefault();
  const url=location.href, data={title:'Milez Ahead — Live trip',text:'Follow my Milez Ahead trip live',url};
  if(navigator.share){navigator.share(data).catch(()=>{});}
  else if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>alert('Trip link copied to clipboard')).catch(()=>prompt('Copy this link',url));}
  else {prompt('Copy this link',url);}
}
function openSos(){document.getElementById('sosModal').classList.add('show');}
function closeSos(){document.getElementById('sosModal').classList.remove('show');}
async function sosConfirm(){
  const go=document.getElementById('sosGo'); if(go){go.disabled=true; go.textContent='Alerting…';}
  let ok=false;
  try{const r=await fetch(SOS_EDGE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:TOKEN})}); const j=await r.json().catch(()=>({})); ok=r.ok&&j.ok;}catch(e){}
  document.getElementById('sosBody').innerHTML = ok
    ? '<h3>✅ Control room alerted</h3><p>Our team now has your trip and your driver’s live location. Keep this page open — we’ll be in touch. If you’re in immediate danger, call 10111.</p>'
    : '<h3>Couldn’t send the alert</h3><p>Please call our control room directly on 082 859 0094, or dial 10111 for emergencies.</p>';
  document.getElementById('sosActs').innerHTML='<button class="no" onclick="closeSos()">Close</button>';
}
loadMaps();tick();_timer=setInterval(tick,12000);
</script>
</body>
</html>
