<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>html,body,#map{height:100%;margin:0}#out{position:fixed;z-index:10;top:8px;left:8px;right:8px;background:#fff;padding:10px;font:13px system-ui;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.2)}</style>
</head><body>
<div id="out">loading…</div><div id="map"></div>
<script>
(g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));m.head.append(a)}));d[l]?console.warn(p+" only loads once. Ignoring:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({key:"AIzaSyAtZvXbiV8BhpC_6dENVYrxoNWdPJlwNiM",v:"weekly"});
async function run(){
  const out=document.getElementById('out');
  try{
    const {Map}=await google.maps.importLibrary('maps');
    let HeatmapLayer=null, importErr='';
    try{ const vis=await google.maps.importLibrary('visualization'); HeatmapLayer=vis.HeatmapLayer; }
    catch(e){ importErr=e.message; }
    out.innerHTML='visualization import: '+(importErr?('FAILED → '+importErr):'ok')+
      '<br>returned HeatmapLayer: <b>'+(typeof HeatmapLayer)+'</b>'+
      '<br>global google.maps.visualization: <b>'+(typeof google.maps.visualization)+'</b>';
    const map=new Map(document.getElementById('map'),{center:{lat:-33.97,lng:18.6},zoom:11,disableDefaultUI:true});
    const pts=[]; for(let i=0;i<80;i++){pts.push(new google.maps.LatLng(-33.97+(Math.random()-0.5)*0.05, 18.6+(Math.random()-0.5)*0.05));}
    if(typeof HeatmapLayer==='function'){
      new HeatmapLayer({data:pts,map,radius:30,opacity:0.9});
      out.innerHTML+='<br>heatmap: <b>CREATED</b> (you should see a colour blob)';
    } else {
      out.innerHTML+='<br>heatmap: <b>NOT AVAILABLE</b>';
    }
  }catch(e){ out.innerHTML='FATAL: '+e.message; }
}
run();
</script></body></html>
