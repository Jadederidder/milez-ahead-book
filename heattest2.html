<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>html,body,#map{height:100%;margin:0}#out{position:fixed;z-index:10;top:8px;left:8px;background:#fff;padding:8px;font:13px system-ui;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.2)}</style>
</head><body>
<div id="out">loading…</div><div id="map"></div>
<script>
(g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));m.head.append(a)}));d[l]?console.warn(p+" only loads once. Ignoring:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({key:"AIzaSyAtZvXbiV8BhpC_6dENVYrxoNWdPJlwNiM",v:"weekly"});

function makeHeatmap(google, map, points, radius, opacity){
  const c=document.createElement('canvas');c.width=256;c.height=1;const cx=c.getContext('2d');
  const grad=cx.createLinearGradient(0,0,256,0);
  grad.addColorStop(0,'rgba(0,120,128,0)');grad.addColorStop(0.18,'rgba(0,120,128,1)');grad.addColorStop(0.4,'rgba(60,160,120,1)');
  grad.addColorStop(0.6,'rgba(192,176,112,1)');grad.addColorStop(0.8,'rgba(224,140,52,1)');grad.addColorStop(1,'rgba(200,45,40,1)');
  cx.fillStyle=grad;cx.fillRect(0,0,256,1);const ramp=cx.getImageData(0,0,256,1).data;
  class Heat extends google.maps.OverlayView{
    onAdd(){const panes=this.getPanes();if(!panes)return;const cv=document.createElement('canvas');cv.style.position='absolute';cv.style.pointerEvents='none';this.canvas=cv;panes.overlayLayer.appendChild(cv);}
    onRemove(){this.canvas&&this.canvas.remove();this.canvas=null;}
    draw(){const canvas=this.canvas,proj=this.getProjection(),bounds=map.getBounds();if(!canvas||!proj||!bounds)return;
      const ne=proj.fromLatLngToDivPixel(bounds.getNorthEast()),sw=proj.fromLatLngToDivPixel(bounds.getSouthWest());if(!ne||!sw)return;
      const left=Math.min(sw.x,ne.x),top=Math.min(ne.y,sw.y),width=Math.max(1,Math.round(Math.abs(ne.x-sw.x))),height=Math.max(1,Math.round(Math.abs(sw.y-ne.y)));
      canvas.style.left=left+'px';canvas.style.top=top+'px';canvas.width=width;canvas.height=height;const ctx=canvas.getContext('2d');ctx.clearRect(0,0,width,height);
      for(const pt of points){const pp=proj.fromLatLngToDivPixel(new google.maps.LatLng(pt.lat,pt.lng));if(!pp)continue;const x=pp.x-left,y=pp.y-top;
        if(x<-radius||y<-radius||x>width+radius||y>height+radius)continue;const rg=ctx.createRadialGradient(x,y,0,x,y,radius);
        rg.addColorStop(0,'rgba(0,0,0,0.18)');rg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=rg;ctx.fillRect(x-radius,y-radius,radius*2,radius*2);}
      const img=ctx.getImageData(0,0,width,height),dd=img.data;
      for(let i=0;i<dd.length;i+=4){const al=dd[i+3];if(al===0)continue;const j=al*4;dd[i]=ramp[j];dd[i+1]=ramp[j+1];dd[i+2]=ramp[j+2];dd[i+3]=Math.min(255,Math.round(al*opacity*1.7));}
      ctx.putImageData(img,0,0);}
  }
  const o=new Heat();o.setMap(map);return o;
}

async function run(){
  const out=document.getElementById('out');
  try{
    const {Map}=await google.maps.importLibrary('maps');
    const map=new Map(document.getElementById('map'),{center:{lat:-33.97,lng:18.6},zoom:11,disableDefaultUI:true});
    const pts=[];for(let i=0;i<120;i++){pts.push({lat:-33.97+(Math.random()-0.5)*0.06,lng:18.6+(Math.random()-0.5)*0.06});}
    // a hot cluster
    for(let i=0;i<200;i++){pts.push({lat:-33.969+(Math.random()-0.5)*0.008,lng:18.602+(Math.random()-0.5)*0.008});}
    makeHeatmap(google,map,pts,24,0.9);
    out.textContent='canvas heatmap drawn — '+pts.length+' points (expect teal→red blob)';
  }catch(e){out.textContent='ERROR: '+e.message;}
}
run();
</script></body></html>
